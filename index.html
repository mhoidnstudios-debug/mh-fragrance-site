<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MH Fragrance – Spirit of the Ocean</title>
  <meta name="description" content="MH Fragrance – minimalistisches Duft- und Salzspray-Erlebnis." />
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

  body {
  font-family: Arial, sans-serif;
  background: #0a0a0a;
  color: white;
  line-height: 1.6;
}
    .section {
      max-width: 900px;
      margin: 0 auto;
      padding: 100px 24px;
      text-align: center;
    }

    .small {
      font-size: 12px;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.55);
    }

    h1, h2, h3 {
      font-weight: 600;
    }

    h1 {
      font-size: 56px;
      margin-top: 24px;
      line-height: 1.1;
    }

    h2 {
      font-size: 36px;
      margin-bottom: 20px;
    }

    h3 {
      font-size: 26px;
      margin-top: 24px;
    }

    p {
      margin-top: 24px;
      color: rgba(255,255,255,0.75);
      font-size: 18px;
    }

    .btn {
      display: inline-block;
      margin-top: 36px;
      padding: 14px 28px;
      border-radius: 999px;
      background: white;
      color: black;
      text-decoration: none;
      font-weight: bold;
    }

    .card {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 20px;
      padding: 32px 24px;
      margin-top: 32px;
    }

    .image-placeholder {
      height: 280px;
      border-radius: 16px;
      background: linear-gradient(to bottom, #3a3a3a, #111);
      margin-bottom: 24px;
    }

    .price {
      font-size: 30px;
      font-weight: bold;
      margin-top: 18px;
      color: white;
    }

    .spacer {
      height: 30px;
    }
  .page {
  min-height: 500vh;
  background-image: url('websiteback.png');
  background-size: 600% auto;
  background-position: center top;
  background-repeat: no-repeat;
}

  background: linear-gradient(
    to top,
    rgba(10,10,10,0) 0%,
    rgba(10,10,10,0.6) 60%,
    #0a0a0a 100%
  );

  pointer-events: none;
}
    
.section {
  margin: 0;
  padding: 60px 20px;
}

    @media (max-width: 768px) {

  body {
    background-attachment: scroll;
    background-position: center top;
  }

  .section {
    max-width: 100%;
    padding: 70px 18px;
  }

  h1 {
    font-size: 34px;
  }

  h2 {
    font-size: 26px;
  }

  p {
    font-size: 16px;
  }

  .card {
    padding: 24px 18px;
    margin-top: 24px;
  }

  .btn {
    width: 100%;
    padding: 16px 20px;
    font-size: 16px;
  }

  .price {
    font-size: 26px;
  }
}
  </style>
</head>
<body>

 <main class="page">

  <section class="section">
    <div class="small">MH Fragrance</div>
    <h1>Spirit of the Ocean</h1>
    <p>Salz. Duft. Präsenz.</p>
    <a href="#kaufen" class="btn">Jetzt probieren</a>
  </section>

  <section class="section" id="kaufen">
    <h2>Herren Edition</h2>
    <div class="price">19 €</div>
    <a href="#" class="btn">Mit PayPal kaufen</a>
  </section>

</main>
  
</body>
</html>
